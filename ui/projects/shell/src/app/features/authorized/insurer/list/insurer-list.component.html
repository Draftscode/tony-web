@let insurers = insurerStore.insurers.value();
<div class="flex flex-col w-full gap-3 h-full overflow-auto">
    <div class="flex gap3 justify-between items-start">
        <!-- Header -->
        <div class="flex items-center pb-4">
            <span
                class="flex w-10 h-10 shrink-0 justify-center items-center rounded-xl bg-orange-100 dark:bg-orange-900/40 text-orange-600 dark:text-orange-400">
                <i class="pi pi-building text-base"></i>
            </span>
            <div class="flex flex-col min-w-0">
                <span
                    class="text-base font-semibold text-surface-800 dark:text-surface-100">{{'insurer.label'|translate}}</span>
                <span class="text-xs text-surface-400 dark:text-surface-500">{{'insurer.subtitle'|translate}}</span>
            </div>
        </div>

        <!-- Search -->
        <app-list-search [query]="insurerStore.filter.query()" (queryChange)="insurerStore.search({query: $event})" />
    </div>
    <p-divider />
    <div class="flex flex-col gap-3 overflow-auto min-h-0 h-full">
        <!-- Table -->
        <div class="rounded-xl border border-surface-200 dark:border-surface-700">
            <app-table [sortField]="insurerStore.filter.sortField()" [sortOrder]="insurerStore.filter.sortOrder()"
                class="w-full" (lazyLoad)="onLazyLoad($event)" [rowsPerPage]="100" [totalRows]="insurers?.total ?? 0"
                [items]="insurers?.items ?? []" [config]="insurerTableConfig()" [disabled]="insurerStore.isLoading()">
                <ng-template #column let-column>
                    {{column.label | translate | titlecase }}
                </ng-template>
                <ng-template #cell let-row let-column="column">
                    @switch(column.key) {
                    @case('blocks') {
                    <div class="flex gap-1">
                        {{row.blocks?.length ?? 0}}
                    </div>
                    }
                    @case ('logo') {
                    <app-company [company]="row" [showLabel]="false" />
                    }
                    @default {
                    {{row[column.key]}}
                    }
                    }
                </ng-template>
            </app-table>
        </div>
    </div>
</div>
