<div class="flex flex-col gap-5 w-[480px] max-w-full">

    <!-- Dialog header -->
    <div class="flex items-center gap-3 pb-4 border-b border-surface-200 dark:border-surface-700">
        <span class="flex w-10 h-10 shrink-0 justify-center items-center rounded-xl bg-violet-100 dark:bg-violet-900/40 text-violet-600 dark:text-violet-400">
            <i class="pi pi-bolt text-base"></i>
        </span>
        <div class="flex flex-col min-w-0">
            <span class="text-base font-semibold text-surface-800 dark:text-surface-100">{{selectedDivision()?.text}}</span>
            <span class="text-xs text-surface-400 dark:text-surface-500">{{'group.info.subtitle'|translate}}</span>
        </div>
    </div>

    <!-- Empty state -->
    @if(!ngForm.blocks().value().length) {
    <div class="flex flex-col items-center gap-3 py-8 text-center">
        <span class="flex w-12 h-12 justify-center items-center rounded-xl bg-surface-100 dark:bg-surface-800 text-surface-400 dark:text-surface-500">
            <i class="pi pi-inbox text-xl"></i>
        </span>
        <div class="flex flex-col gap-1">
            <span class="text-sm font-medium text-surface-600 dark:text-surface-300">{{'block.empty'|translate}}</span>
        </div>
    </div>
    } @else {

    <!-- Block inputs -->
    <div class="flex flex-col gap-3">
        @for(block of ngForm.blocks; track block) {
        <div class="flex flex-col gap-1 p-3 rounded-lg bg-surface-50 dark:bg-surface-800 border border-surface-200 dark:border-surface-700">
            <div class="flex items-center justify-between mb-1">
                <label class="text-xs font-semibold text-surface-600 dark:text-surface-300">{{block.key().value()}}</label>
                @if(block.description().value()) {
                <span [pTooltip]="block.description().value()" class="flex w-5 h-5 justify-center items-center rounded-full bg-surface-200 dark:bg-surface-700 text-surface-400 dark:text-surface-500 cursor-help">
                    <i class="pi pi-info text-xs"></i>
                </span>
                }
            </div>
            <input [placeholder]="block.placeholder().value()" pInputText [field]="block.value" class="w-full" />
        </div>
        }
    </div>

    }

    <!-- Actions -->
    <div class="flex justify-end pt-2 border-t border-surface-200 dark:border-surface-700">
        <p-button (onClick)="close()" icon="pi pi-check" [label]="'action.complete'|translate" />
    </div>

</div>
