<p-iconfield>
    <p-inputicon class="pi pi-search" />
    <input [debounceTime]="450" [value]="query()" (debounce)="query.set($event)" type="text" pInputText
        [placeholder]="'label.search'|translate" />
    @if(query()) {
    <p-inputicon class="pi pi-times" (click)="query.set('')" />
    }
</p-iconfield>
